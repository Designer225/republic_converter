 immediate_convert_republics_decision:0 "Immediately Convert Republics"
 immediate_convert_republics_decision_tooltip:0 "Convert [republics|E] to an alternative, playble form."
 immediate_convert_republics_decision_desc:0 "$immediate_convert_republics_decision_tooltip$ The types of governments they convert to depend on the game rules."
 immediate_convert_republics_decision_confirm:0 "Convert"

 game_concept_default_republic_converter_behavior:0 "Republic Converter Behavior"
 game_concept_default_republic_converter_behavior_desc:0 "A [republic|E] will be converted as follows:#indent_newline:2 $BULLET_WITH_TAB$If a [liege|E] exists and is [government_bureaucratic_type|E], the [republican|E] vassal will convert to their [liege|E]'s [government|E].#indent_newline:1 $BULLET_WITH_TAB$Otherwise, the [republic|E] will convert to a [government_bureaucratic_type|E] [government|E] appropriate for its locale.#indent_newline:1 $BULLET_WITH_TAB$Non-Eastern [republics|E] will attempt to convert to [administrative|E].#indent_newline:1 $BULLET_WITH_TAB$Eastern [republics|E] will attempt to convert to [meritocratic|E], except in Japan under administrative rule where they will convert to [japan_administrative|E] instead.#indent_newline:1 $BULLET_WITH_TAB$[republics|E] under the main administrative tier for their target [government_bureaucratic_type|E] [government|E] are handled specially. (The main administrative tier is the tier at which [government_bureaucratic_type|E] [governorships|E] are fully functional, including [title_men_at_arms|E].)#indent_newline:1 $BULLET_WITH_TAB$Special handling may include creating a [titular_title|E] of a tier equal to at least the main administrative tier, forcibly converting to the target [government_bureaucratic_type|E] [government|E] despite any issue that arises, or aborting the conversion entirely.#indent_newline:1 $BULLET_WITH_TAB$To avoid excessive reappointments of baronies, [republican|E] [barons|E] will never be converted."

 game_rule_category_republic_converter:0 "Republic Converter"
 
 rule_republic_conversion:0 "Republic Conversion"
 setting_republic_conversion_default:0 "Default"
 setting_republic_conversion_default_desc:0 "[republican|E] rulers will be converted to a [government|E] type according to the [default_republic_converter_behavior|E]."
 setting_republic_conversion_administrative:0 "[administrative|E]"
 setting_republic_conversion_administrative_desc:0 "[republican|E] rulers will be converted to the [administrative|E] [government|E]. $ep3_dlc_status$"
 setting_republic_conversion_meritocratic:0 "[meritocratic|E]"
 setting_republic_conversion_meritocratic_desc:0 "[republican|E] rulers will be converted to the [meritocratic|E] [government|E]. $tgp_dlc_status$"
 setting_republic_conversion_steppe_admin:0 "[steppe_admin|E]"
 setting_republic_conversion_steppe_admin_desc:0 "[republican|E] rulers will be converted to the [steppe_admin|E] [government|E]. $tgp_dlc_status$"
 setting_republic_conversion_celestial:0 "[celestial|E]"
 setting_republic_conversion_celestial_desc:0 "[republican|E] rulers will be converted to the [celestial|E] [government|E]. $tgp_dlc_status$"
 setting_republic_conversion_ritsuryo:0 "[japan_administrative|E]"
 setting_republic_conversion_ritsuryo_desc:0 "[republican|E] rulers will be converted to the [japan_administrative|E] [government|E]. $tgp_dlc_status$"
 setting_republic_conversion_none:0 "None"
 setting_republic_conversion_none_desc:0 "[republican|E] rulers will not be converted to any [government|E]."

 rule_republic_conversion_under_main_tier_handling:0 "Under Appointment Tier Handling"
 setting_republic_conversion_under_main_tier_handling_title:0 "[titular_title|E] Fallback"
 setting_republic_conversion_under_main_tier_handling_title:0 "If a [republican|E] ruler does not meet the minimum main administrative [governorship|E] tier for the target [government_bureaucratic_type|E] [government|E], it will receive a [titular_title|E] of a tier equal to the minimum tier. ([barons|E] will never be converted.)"
 setting_republic_conversion_under_main_tier_handling_as_is:0 "As-is"
 setting_republic_conversion_under_main_tier_handling_as_is_desc:0 "#N Not recommended!#! [republics|E] not meeting the minimum main administrative [governorship|E] tier are still converted as-is. Any erroneous behaviors arising from this is not our responsibility. ([barons|E] will never be converted.)"
 setting_republic_conversion_under_main_tier_handling_none:0 "No Conversion"
 setting_republic_conversion_under_main_tier_handling_none_desc:0 "[republics|E] not meeting the minimum main administrative [governorship|E] tier will not be converted. ([barons|E] will never be converted.)"